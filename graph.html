<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <!-- VIS NETWORK -->
    <script type="text/javascript"
        src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        .graph-container {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .graph-title {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        #mynetwork {
            width: 100%;
            height: 650px;
            background: linear-gradient(135deg, #111827, #1e293b);
            border-radius: 20px;
            border: 2px solid #334155;
            box-shadow: 0px 0px 25px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>

<body>

    <div class="graph-container">

        <div class="graph-title">
            🚀 SkillGraph AI — Candidate Skill Network
        </div>

        <div id="mynetwork"></div>

    </div>

    <script type="text/javascript">

        // -------------------------------
        // NODES
        // -------------------------------

        const nodes = new vis.DataSet([

            {
                id: "python",
                label: "Python",
                color: "#22c55e",
                shape: "dot",
                size: 28,
                font: {
                    color: "white",
                    size: 20
                }
            },

            {
                id: "aws",
                label: "AWS",
                color: "#3b82f6",
                shape: "dot",
                size: 26,
                font: {
                    color: "white",
                    size: 20
                }
            },

            {
                id: "docker",
                label: "Docker",
                color: "#06b6d4",
                shape: "dot",
                size: 26,
                font: {
                    color: "white",
                    size: 20
                }
            },

            {
                id: "nlp",
                label: "NLP",
                color: "#8b5cf6",
                shape: "dot",
                size: 26,
                font: {
                    color: "white",
                    size: 20
                }
            },

            {
                id: "machine",
                label: "Machine Learning",
                color: "#ef4444",
                shape: "dot",
                size: 30,
                font: {
                    color: "white",
                    size: 20
                }
            },

            {
                id: "kubernetes",
                label: "Kubernetes",
                color: "#f97316",
                shape: "dot",
                size: 28,
                font: {
                    color: "white",
                    size: 20
                }
            },

            {
                id: "deep",
                label: "Deep Learning",
                color: "#ec4899",
                shape: "dot",
                size: 30,
                font: {
                    color: "white",
                    size: 20
                }
            },

            {
                id: "skills",
                label: "Skill Matching",
                color: "#14b8a6",
                shape: "dot",
                size: 30,
                font: {
                    color: "white",
                    size: 20
                }
            },

            {
                id: "engineer",
                label: "AI Engineer",
                color: "#eab308",
                shape: "star",
                size: 35,
                font: {
                    color: "white",
                    size: 22
                }
            }

        ]);

        // -------------------------------
        // EDGES
        // -------------------------------

        const edges = new vis.DataSet([

            {
                from: "python",
                to: "machine"
            },

            {
                from: "machine",
                to: "deep"
            },

            {
                from: "deep",
                to: "nlp"
            },

            {
                from: "python",
                to: "docker"
            },

            {
                from: "docker",
                to: "kubernetes"
            },

            {
                from: "aws",
                to: "docker"
            },

            {
                from: "skills",
                to: "engineer"
            },

            {
                from: "machine",
                to: "engineer"
            },

            {
                from: "nlp",
                to: "engineer"
            }

        ]);

        // -------------------------------
        // GRAPH CONTAINER
        // -------------------------------

        const container = document.getElementById("mynetwork");

        const data = {
            nodes: nodes,
            edges: edges
        };

        // -------------------------------
        // OPTIONS
        // -------------------------------

        const options = {

            nodes: {
                borderWidth: 2
            },

            edges: {
                color: "#94a3b8",
                smooth: {
                    type: "dynamic"
                },
                width: 2
            },

            physics: {
                enabled: true,
                barnesHut: {
                    gravitationalConstant: -3000,
                    springLength: 180,
                    springConstant: 0.04
                }
            },

            interaction: {
                hover: true,
                dragNodes: true,
                zoomView: true
            }
        };

        // -------------------------------
        // CREATE NETWORK
        // -------------------------------

        const network = new vis.Network(
            container,
            data,
            options
        );

    </script>

</body>

</html>
